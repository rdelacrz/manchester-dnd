    fix-state: wont-fix
    package:
      name: libc6
      version: 2.41-12+deb13u3
      type: deb
  - vulnerability: CVE-2026-5928
    fix-state: wont-fix
    package:
      name: libc6
      version: 2.41-12+deb13u3
      type: deb
  - vulnerability: CVE-2026-5435
    fix-state: wont-fix
