# Manchester Arcana release dependency policy. Keep this file fail-closed:
# advisories, unknown licenses, and non-crates.io sources are release blockers.

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "wasm32-unknown-unknown",
]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "Transitive Leptos macro dependency; no safe upgrade exists. Reviewed and bounded in docs/security/dependency-exceptions.md." },
    { id = "RUSTSEC-2026-0173", reason = "Transitive Leptos macro dependency; no safe upgrade exists. Reviewed and bounded in docs/security/dependency-exceptions.md." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []
unused-allowed-license = "deny"
unused-license-exception = "deny"

[licenses.private]
# Workspace packages are unpublished private-MVP code, not third-party inputs.
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "simplest-path"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
